services:
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - ./infra/redis/redis.test.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5
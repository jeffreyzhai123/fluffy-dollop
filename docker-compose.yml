services:
  redis:
    image: redis:7-alpine
    container_name: logs-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: logs-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d/migrations:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c logging_collector=off
        -c log_min_messages=error
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 60s

  ingestion:
    build:
      context: .
      dockerfile: build/ingestion/Dockerfile
    container_name: ingestion
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SERVER_HOST: "0.0.0.0"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
      - frontend
    stop_grace_period: 30s

  # Partition 0 — two workers for redundancy and load distribution within partition
  worker-0-a:
    build:
      context: .
      dockerfile: build/worker/Dockerfile
    container_name: worker-0-a
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QUEUE_PARTITION_ID: "0"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 30s

  worker-0-b:
    build:
      context: .
      dockerfile: build/worker/Dockerfile
    container_name: worker-0-b
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QUEUE_PARTITION_ID: "0"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 30s

  # Partition 1 — two workers for redundancy and load distribution within partition
  worker-1-a:
    build:
      context: .
      dockerfile: build/worker/Dockerfile
    container_name: worker-1-a
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QUEUE_PARTITION_ID: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 30s

  worker-1-b:
    build:
      context: .
      dockerfile: build/worker/Dockerfile
    container_name: worker-1-b
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QUEUE_PARTITION_ID: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 30s

  controlplane:
    build:
      context: .
      dockerfile: build/control_plane/Dockerfile
    container_name: controlplane
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"

    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    stop_grace_period: 15s

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  redis_data:
  postgres_data: